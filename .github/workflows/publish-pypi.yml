name: Publish to PyPI

# Publishes the library when a GitHub Release is published. Uses PyPI Trusted Publishing
# (OIDC) — no API token stored in the repo. One-time setup on PyPI: add a trusted publisher
# for project "dprovenancekit" → owner/repo, workflow "publish-pypi.yml", environment "pypi".
on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
