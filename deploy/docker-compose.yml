# Production deploy: the DProvenanceKit backend behind Caddy (automatic HTTPS).
#
#   cp deploy/.env.example deploy/.env      # set DOMAIN (+ optional Stripe vars)
#   docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d --build
#
# The backend is NOT exposed to the host — only Caddy (80/443) is public; it reaches
# the backend over the internal compose network. Data persists in named volumes.
services:
  dprovenancekit:
    build:
      context: ..
      dockerfile: Dockerfile
    image: dprovenancekit-server
    environment:
      DPROV_STORAGE: sqlite
      DPROV_DATA_DIR: /data
      HOST: "0.0.0.0"
      PORT: "8787"
      DPROV_STRIPE_WEBHOOK_SECRET: ${DPROV_STRIPE_WEBHOOK_SECRET:-}
      DPROV_STRIPE_PRICE_PLANS: ${DPROV_STRIPE_PRICE_PLANS:-}
    volumes:
      - dprov-data:/data           # trace stores + tenancy DB (back this up)
    expose:
      - "8787"                     # internal only
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      - dprovenancekit
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in deploy/.env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data           # ACME certs/keys — persist so you don't re-issue
      - caddy-config:/config
    restart: unless-stopped

volumes:
  dprov-data:
  caddy-data:
  caddy-config:
