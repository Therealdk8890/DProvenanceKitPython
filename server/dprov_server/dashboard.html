<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DProvenanceKit — Regression Gate</title>
<style>
  :root{
    --bg:#0e1117; --panel:#161b22; --panel2:#1b222c; --border:#2a313c;
    --text:#e6edf3; --muted:#8b949e; --accent:#58a6ff;
    --ok:#3fb950; --okbg:#0f2417; --bad:#f85149; --badbg:#2b1416; --warn:#d29922; --warnbg:#2a2113;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font:14px/1.5 -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif}
  header{display:flex;align-items:center;gap:16px;padding:14px 22px;border-bottom:1px solid var(--border);background:var(--panel)}
  header h1{font-size:16px;margin:0;font-weight:600;letter-spacing:.2px}
  header h1 .dot{color:var(--accent)}
  header .spacer{flex:1}
  header label{color:var(--muted);font-size:12px;margin-right:6px}
  input,select,button{font:inherit;color:var(--text);background:var(--panel2);border:1px solid var(--border);border-radius:7px;padding:6px 10px}
  input:focus,select:focus{outline:none;border-color:var(--accent)}
  button{cursor:pointer;background:#21262d}
  button.primary{background:var(--accent);color:#06101f;border-color:var(--accent);font-weight:600}
  button:hover{filter:brightness(1.1)}
  main{display:grid;grid-template-columns:1.1fr .9fr;gap:18px;padding:18px 22px;max-width:1280px;margin:0 auto}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px}
  .panel h2{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:0 0 12px}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:8px 6px;border-bottom:1px solid var(--border);vertical-align:top}
  th{color:var(--muted);font-weight:500;font-size:12px}
  td.fp{font-family:var(--mono);color:var(--muted);font-size:12px}
  .chip{display:inline-block;background:var(--panel2);border:1px solid var(--border);border-radius:20px;padding:1px 9px;margin:2px 3px 2px 0;font-size:12px}
  .chip.crit{border-color:#5a2b2b;color:#ffb4ab}
  .row-controls{display:flex;gap:10px;align-items:end;flex-wrap:wrap;margin-bottom:14px}
  .field{display:flex;flex-direction:column;gap:4px}
  .field label{font-size:11px;color:var(--muted)}
  .verdict{border-radius:10px;padding:16px;margin-top:6px;border:1px solid var(--border)}
  .verdict.pass{background:var(--okbg);border-color:#1c5a2e}
  .verdict.fail{background:var(--badbg);border-color:#6e2a28}
  .badge{display:inline-block;font-weight:700;letter-spacing:.5px;padding:3px 12px;border-radius:6px;font-size:13px}
  .badge.pass{background:var(--ok);color:#06210f}
  .badge.fail{background:var(--bad);color:#2a0a0a}
  .lvl{font-family:var(--mono);font-size:13px}
  .kv{color:var(--muted);font-size:13px;margin-top:8px}
  .grp{margin-top:10px}
  .grp .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  pre{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;overflow:auto;font-size:12px;color:var(--muted);white-space:pre-wrap}
  .empty{color:var(--muted);font-style:italic;padding:10px 4px}
  .err{color:var(--bad);font-size:13px;margin-top:8px}
  tr.sel{background:#15202e}
  code{font-family:var(--mono);background:var(--panel2);padding:1px 5px;border-radius:5px;font-size:12px}
  /* reasoning diff */
  .diff-summary{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .stat{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:5px 11px;font-size:13px;color:var(--muted)}
  .stat b{font-family:var(--mono);color:var(--text)}
  .stat.add b{color:var(--ok)} .stat.rem b{color:var(--bad)} .stat.mod b{color:var(--warn)}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .col h3{font-size:12px;color:var(--muted);margin:0 0 8px;text-transform:uppercase;letter-spacing:.5px}
  .tree{font-family:var(--mono);font-size:12px}
  .span{margin:6px 0;border-left:2px solid var(--border);padding-left:10px}
  .span > .span-hd{color:var(--muted);padding:2px 0}
  .span.span-removed>.span-hd{color:var(--bad)} .span.span-added>.span-hd{color:var(--ok)} .span.span-reparented>.span-hd{color:var(--warn)}
  .ev{padding:2px 6px;border-radius:5px;cursor:pointer}
  .ev:hover{background:var(--panel2)}
  .ev .seq{color:var(--muted);display:inline-block;min-width:22px;text-align:right;margin-right:8px}
  .ev .eng{color:var(--muted);font-size:11px;margin-left:8px}
  .ev-removed{background:var(--badbg);color:#ffb4ab} .ev-added{background:var(--okbg);color:#9be7a8} .ev-modified{background:var(--warnbg);color:#f1d58c}
  .ev.diverge{outline:1px dashed var(--warn);outline-offset:1px}
  .ev-pay{display:none;margin:4px 0 4px 28px;font-size:11px;max-height:220px;overflow:auto}
  .ev.open .ev-pay{display:block}
</style>
</head>
<body>
<header>
  <h1><span class="dot">◆</span> DProvenanceKit <span style="color:var(--muted);font-weight:400">· Regression Gate</span></h1>
  <span class="spacer"></span>
  <span id="project" style="color:var(--muted);font-size:12px"></span>
  <label for="key">API key</label>
  <input id="key" value="demo-key" style="width:140px" />
  <button onclick="loadRuns()">Refresh</button>
</header>

<main>
  <section class="panel">
    <h2>Runs</h2>
    <table>
      <thead><tr><th>Context</th><th>Steps</th><th>Engines</th><th>Fingerprint</th></tr></thead>
      <tbody id="runs"></tbody>
    </table>
    <div id="runs-empty" class="empty">No runs yet. Ingest some via the <code>CloudTraceStore</code> SDK, then Refresh.</div>
  </section>

  <section class="panel">
    <h2>Regression gate</h2>
    <div class="row-controls">
      <div class="field"><label>Golden run</label><select id="golden"></select></div>
      <div class="field"><label>Candidate run</label><select id="candidate"></select></div>
      <div class="field"><label>Max severity allowed</label>
        <select id="maxlevel"><option value="none">none (strict)</option><option value="low">low</option><option value="medium">medium</option><option value="high">high</option></select>
      </div>
      <div class="field"><label>&nbsp;</label><label style="font-size:13px;color:var(--text)"><input type="checkbox" id="allowdiv" style="vertical-align:-2px"> allow divergent</label></div>
      <div class="field"><label>&nbsp;</label><button class="primary" onclick="runGate()">Run gate</button></div>
      <div class="field"><label>&nbsp;</label><button onclick="exportReport()">Export report</button></div>
    </div>
    <div id="verdict"></div>
  </section>

  <section class="panel" style="grid-column:1 / -1">
    <h2>Run inspector</h2>
    <div class="row-controls">
      <div class="field"><label>Run</label><select id="inspect-run"></select></div>
      <div class="field"><label>&nbsp;</label><button class="primary" onclick="inspectRun()">Inspect</button></div>
      <div class="field"><label>&nbsp;</label><span class="empty" style="font-style:normal">span tree · click an event to inspect its payload</span></div>
    </div>
    <div id="inspect-out"></div>
  </section>

  <section class="panel" style="grid-column:1 / -1">
    <h2>Reasoning diff</h2>
    <div class="row-controls">
      <div class="field"><label>Base run</label><select id="diff-base"></select></div>
      <div class="field"><label>Comparison run</label><select id="diff-cmp"></select></div>
      <div class="field"><label>&nbsp;</label><button class="primary" onclick="runDiff()">Diff</button></div>
      <div class="field"><label>&nbsp;</label><span class="empty" style="font-style:normal">click an event to inspect its payload</span></div>
    </div>
    <div id="diff-out"></div>
  </section>
</main>

<script>
const key = () => document.getElementById('key').value.trim();
const hdr = () => ({'Authorization': 'Bearer ' + key(), 'Content-Type': 'application/json'});
let RUNS = [];

function short(fp){ return fp ? fp.slice(0,10) + '…' : ''; }
function chips(items, cls){ return (items||[]).map(s => `<span class="chip ${cls||''}">${s}</span>`).join('') || '<span class="empty">—</span>'; }

async function loadRuns(){
  document.getElementById('verdict').innerHTML = '';
  try{
    const r = await fetch('/api/runs', {headers: hdr()});
    if(!r.ok){ throw new Error('HTTP ' + r.status); }
    const data = await r.json();
    RUNS = data.runs || [];
    document.getElementById('project').textContent = data.project ? ('project: ' + data.project) : '';
  }catch(e){ RUNS = []; document.getElementById('runs').innerHTML = `<tr><td colspan="4" class="err">${e.message} — check the API key</td></tr>`; document.getElementById('runs-empty').style.display='none'; return; }

  const tbody = document.getElementById('runs');
  document.getElementById('runs-empty').style.display = RUNS.length ? 'none' : 'block';
  tbody.innerHTML = RUNS.map(run => `
    <tr title="${run.run_id}">
      <td>${run.context_id || '<span class="empty">—</span>'}</td>
      <td>${chips(run.steps)}</td>
      <td style="color:var(--muted)">${(run.engines||[]).join(', ')}</td>
      <td class="fp">${short(run.fingerprint)}</td>
    </tr>`).join('');

  const opts = RUNS.map(r => `<option value="${r.run_id}">${(r.context_id||r.run_id.slice(0,8))} · ${short(r.fingerprint)}</option>`).join('');
  for(const id of ['golden','candidate','diff-base','diff-cmp','inspect-run']){
    const sel = document.getElementById(id);
    if(sel) sel.innerHTML = opts;
  }
  if(RUNS.length > 1){
    document.getElementById('candidate').selectedIndex = 1;
    document.getElementById('diff-cmp').selectedIndex = 1;
  }
}

function esc(s){ return String(s==null?'':s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function evKey(e){ return `${e.span_id}|${e.sequence}|${e.type}`; }

async function runDiff(){
  const out = document.getElementById('diff-out');
  const base = document.getElementById('diff-base').value, cmp = document.getElementById('diff-cmp').value;
  if(!base || !cmp){ out.innerHTML = '<div class="err">Pick a base and a comparison run.</div>'; return; }
  out.innerHTML = '<div class="empty">Computing diff…</div>';
  try{
    const [diffR, baseR, cmpR] = await Promise.all([
      fetch('/api/diff', {method:'POST', headers:hdr(), body:JSON.stringify({base_run_id:base, comparison_run_id:cmp})}),
      fetch(`/api/runs/${base}/replay`, {headers:hdr()}),
      fetch(`/api/runs/${cmp}/replay`, {headers:hdr()}),
    ]);
    const diff = await diffR.json();
    if(!diffR.ok){ out.innerHTML = `<div class="err">${diff.error || ('HTTP '+diffR.status)}</div>`; return; }
    const baseSnap = (await baseR.json()).snapshot, cmpSnap = (await cmpR.json()).snapshot;

    const removedEv = new Set(), addedEv = new Set(), modifiedEv = new Set(), divergeEv = new Set();
    for(const c of diff.event_changes){
      if(c.kind === 'removed' && c.event) removedEv.add(evKey(c.event));
      else if(c.kind === 'added' && c.event) addedEv.add(evKey(c.event));
      else if(c.kind === 'modified'){ if(c.before) modifiedEv.add(evKey(c.before)); if(c.after) modifiedEv.add(evKey(c.after)); }
    }
    for(const d of diff.divergences){ if(d.left_event) divergeEv.add(evKey(d.left_event)); if(d.right_event) divergeEv.add(evKey(d.right_event)); }
    const removedSpan = new Set(), addedSpan = new Set(), reSpan = new Set();
    for(const s of diff.span_changes){
      if(s.kind === 'removed') removedSpan.add(s.span_id);
      else if(s.kind === 'added') addedSpan.add(s.span_id);
      else if(s.kind === 'reparented') reSpan.add(s.span_id);
    }

    const sm = diff.summary;
    const stat = (cls,n,label) => `<span class="stat ${cls}"><b>${n}</b> ${label}</span>`;
    const baseM = {removedEv, modifiedEv, divergeEv, removedSpan, reSpan};
    const cmpM = {addedEv, modifiedEv, divergeEv, addedSpan, reSpan};
    out.innerHTML = `
      <div class="diff-summary">
        ${diff.is_identical ? '<span class="stat"><b>identical</b></span>' : ''}
        ${stat('add', sm.added_spans, 'spans +')}${stat('rem', sm.removed_spans, 'spans −')}
        ${stat('add', sm.added_events, 'events +')}${stat('rem', sm.removed_events, 'events −')}${stat('mod', sm.modified_events, 'events ~')}
        ${stat('', sm.divergence_points, 'divergences')}
      </div>
      <div class="cols">
        <div class="col"><h3>base</h3><div class="tree">${renderRoots(baseSnap.roots, 'base', baseM)}</div></div>
        <div class="col"><h3>comparison</h3><div class="tree">${renderRoots(cmpSnap.roots, 'cmp', cmpM)}</div></div>
      </div>`;
  }catch(e){ out.innerHTML = `<div class="err">${e.message}</div>`; }
}

async function inspectRun(){
  const out = document.getElementById('inspect-out');
  const id = document.getElementById('inspect-run').value;
  if(!id){ out.innerHTML = '<div class="err">Pick a run.</div>'; return; }
  out.innerHTML = '<div class="empty">Loading…</div>';
  try{
    const r = await fetch(`/api/runs/${id}/replay`, {headers:hdr()});
    const data = await r.json();
    if(!r.ok){ out.innerHTML = `<div class="err">${data.error || ('HTTP '+r.status)}</div>`; return; }
    const snap = data.snapshot, mf = snap.manifest, orphans = (snap.orphaned_events||[]).length;
    const stat = (cls,n,label) => `<span class="stat ${cls}"><b>${n}</b> ${label}</span>`;
    out.innerHTML = `
      <div class="diff-summary">
        ${stat('', mf.total_events, 'events')}${stat('', mf.reconstructed_spans, 'spans')}
        ${mf.contaminated_spans ? stat('rem', mf.contaminated_spans, 'contaminated') : ''}
        ${orphans ? stat('mod', orphans, 'orphaned') : ''}
        ${(mf.sequence_gaps||[]).length ? stat('mod', mf.sequence_gaps.length, 'gaps') : ''}
      </div>
      <div class="tree">${renderRoots(snap.roots, 'single', {})}</div>
      ${orphans ? `<div class="grp"><div class="label">orphaned events</div><div class="tree">${(snap.orphaned_events||[]).map(e => renderEvent(e, 'single', {})).join('')}</div></div>` : ''}`;
  }catch(e){ out.innerHTML = `<div class="err">${e.message}</div>`; }
}

function renderRoots(roots, side, m){ return (roots||[]).map(n => renderSpan(n, side, m)).join('') || '<div class="empty">—</div>'; }

function renderSpan(node, side, m){
  const isRem = side === 'base' && m.removedSpan && m.removedSpan.has(node.span_id);
  const isAdd = side === 'cmp' && m.addedSpan && m.addedSpan.has(node.span_id);
  const isRe = node.span_id != null && m.reSpan && m.reSpan.has(node.span_id);
  const cls = isRem ? 'span-removed' : isAdd ? 'span-added' : isRe ? 'span-reparented' : '';
  const hd = node.span_id ? `span ${node.span_id}${isRe ? ' · reparented' : ''}` : 'root';
  const events = (node.events||[]).map(e => renderEvent(e, side, m)).join('');
  const children = (node.children||[]).map(c => renderSpan(c, side, m)).join('');
  return `<div class="span ${cls}"><div class="span-hd">${esc(hd)}</div>${events}${children}</div>`;
}

function renderEvent(e, side, m){
  const k = evKey(e);
  let cls = '';
  if(side === 'base' && m.removedEv && m.removedEv.has(k)) cls = 'ev-removed';
  else if(side === 'cmp' && m.addedEv && m.addedEv.has(k)) cls = 'ev-added';
  else if(m.modifiedEv && m.modifiedEv.has(k)) cls = 'ev-modified';
  const div = (m.divergeEv && m.divergeEv.has(k)) ? ' diverge' : '';
  const pay = esc(JSON.stringify(e.payload, null, 2));
  return `<div class="ev ${cls}${div}" onclick="this.classList.toggle('open')">`
    + `<span class="seq">${e.sequence}</span><span>${esc(e.type)}</span><span class="eng">${esc(e.engine||'')}</span>`
    + `<pre class="ev-pay" onclick="event.stopPropagation()">${pay}</pre></div>`;
}

async function runGate(){
  const v = document.getElementById('verdict');
  const golden = document.getElementById('golden').value, candidate = document.getElementById('candidate').value;
  if(!golden || !candidate){ v.innerHTML = '<div class="err">Pick a golden and a candidate run.</div>'; return; }
  v.innerHTML = '<div class="empty">Running gate…</div>';
  try{
    const r = await fetch('/api/gate', {method:'POST', headers: hdr(), body: JSON.stringify({
      golden_run_id: golden, candidate_run_id: candidate,
      max_regression_level: document.getElementById('maxlevel').value,
      allow_divergent_steps: document.getElementById('allowdiv').checked,
    })});
    const rep = await r.json();
    if(!r.ok){ v.innerHTML = `<div class="err">${rep.error || ('HTTP ' + r.status)}</div>`; return; }
    const pass = rep.passed;
    v.innerHTML = `
      <div class="verdict ${pass?'pass':'fail'}">
        <span class="badge ${pass?'pass':'fail'}">${pass?'PASS':'REGRESSION'}</span>
        <span class="lvl" style="margin-left:10px">severity: <b>${rep.regression_level}</b> · strength ${Number(rep.strength).toFixed(2)}</span>
        <div class="kv">fingerprint: ${rep.fingerprint_match ? 'match' : 'differs'} <span class="fp">(${short(rep.golden_fingerprint)} vs ${short(rep.candidate_fingerprint)})</span></div>
        <div class="grp"><div class="label">removed (in golden, missing in candidate)</div>${chips(rep.removed_steps,'crit')}</div>
        <div class="grp"><div class="label">added</div>${chips(rep.added_steps)}</div>
        <div class="grp"><div class="label">divergent</div>${chips(rep.divergent_steps)}</div>
        <pre>${rep.summary}</pre>
      </div>`;
  }catch(e){ v.innerHTML = `<div class="err">${e.message}</div>`; }
}

async function exportReport(){
  const v = document.getElementById('verdict');
  const golden = document.getElementById('golden').value, candidate = document.getElementById('candidate').value;
  if(!golden || !candidate){ v.innerHTML = '<div class="err">Pick a golden and a candidate run.</div>'; return; }
  try{
    const r = await fetch('/api/report', {method:'POST', headers: hdr(), body: JSON.stringify({
      golden_run_id: golden, candidate_run_id: candidate,
      max_regression_level: document.getElementById('maxlevel').value,
      allow_divergent_steps: document.getElementById('allowdiv').checked,
    })});
    if(!r.ok){ const e = await r.json().catch(()=>({})); v.innerHTML = `<div class="err">${e.error || ('HTTP '+r.status)}</div>`; return; }
    const html = await r.text();
    const w = window.open('', '_blank');
    if(w){ w.document.write(html); w.document.close(); }
    else { v.innerHTML = '<div class="err">Pop-up blocked — allow pop-ups to open the report.</div>'; }
  }catch(e){ v.innerHTML = `<div class="err">${e.message}</div>`; }
}

loadRuns();
</script>
</body>
</html>
